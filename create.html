<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create account</title>
<link rel="icon" href="https://nofileteams.github.io/icon.png">

<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-top: 20px;
    color: #00aaff;
    font-size: 48px;
    text-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff,
        0 0 40px #00aaff;
}

.input-box {
    width: 300px;
    padding: 12px;
    margin-top: 15px;
    background: black;
    color: white;
    border: 2px solid #00aaff;
    border-radius: 8px;
    outline: none;
    font-size: 16px;
    box-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff;
}

.input-box::placeholder {
    color: #cccccc;
}

.start-button {
    width: 300px;
    padding: 12px;
    margin-top: 15px;
    background: black;
    color: white;
    border: 2px solid #00aaff;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    box-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff;
}

.start-button:hover {
    box-shadow:
        0 0 8px #00aaff,
        0 0 16px #00aaff,
        0 0 32px #00aaff;
}

.start-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>

<h1>Create NOFILE account</h1>

<input type="text" id="index1" class="input-box" placeholder="nickname">
<input type="password" id="index2" class="input-box" placeholder="password">

<button id="startButton" class="start-button" disabled>Create</button>

<script>
Parse.initialize(
    "B8PFCPMxHRtPexBXtp5ErHbCkaffcsDt2HjfMsKE",
    "U8PaiCuaxQW4KKXq4GKNhN8Qc7nFIkKC1o4v4Lwx"
);
Parse.serverURL = "https://parseapi.back4app.com";

const index1Input = document.getElementById("index1");
const index2Input = document.getElementById("index2");
const startButton = document.getElementById("startButton");

function updateButtonState() {
    startButton.disabled =
        index1Input.value.trim() === "" ||
        index2Input.value.trim() === "";
}

index1Input.addEventListener("input", updateButtonState);
index2Input.addEventListener("input", updateButtonState);

startButton.addEventListener("click", async () => {
    const index1 = index1Input.value.trim();
    const index2 = index2Input.value.trim();

    const QueryClass = Parse.Object.extend("Data");
    const query = new Parse.Query(QueryClass);

    query.equalTo("index1", index1);

    try {
        const existing = await query.first();

        if (existing) {
            alert("Error");
            return;
        }

        const data = new QueryClass();
        data.set("index1", index1);
        data.set("index2", index2);

        await data.save();

        localStorage.setItem("index1", index1);
        localStorage.setItem("index2", index2);

        window.location.href = "https://nofileteams.github.io";
    } catch (error) {
        alert("Error");
    }
});
</script>

</body>
</html>
