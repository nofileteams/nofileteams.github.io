<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOFILE Games</title>
<link rel="icon" href="icon.png">
<style>
  body {
    background-color: #000000;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
  }

  .neon-text {
    color: #00aaff;
    font-size: 80px;
    font-weight: bold;
    text-align: center;
    margin-top: 40px;
    text-shadow:
      0 0 10px #00aaff,
      0 0 20px #00aaff,
      0 0 40px #00aaff,
      0 0 80px #0088dd,
      0 0 120px #0066bb;
  }

  .tool-button {
    display: block;
    width: 300px;
    margin: 40px auto;
    padding: 15px 20px;
    background-color: #000000;
    color: #00aaff;
    border: 3px solid #00aaff;
    border-radius: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    box-shadow:
      0 0 10px #00aaff,
      0 0 20px #00aaff,
      0 0 40px #0088dd,
      0 0 60px #0066bb;
    transition: 0.3s;
    cursor: pointer;
  }

  .tool-button:hover {
    background-color: #001122;
    box-shadow:
      0 0 15px #00ccff,
      0 0 30px #00ccff,
      0 0 60px #0099dd,
      0 0 90px #0077bb;
  }

  .popup-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
  }

  .popup-window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    background: #000000;
    border: 3px solid #00aaff;
    border-radius: 20px;
    padding: 20px;
    box-shadow:
      0 0 15px #00aaff,
      0 0 30px #00aaff,
      0 0 60px #0088dd;
    color: #00aaff;
  }

  .popup-close {
    float: right;
    font-size: 28px;
    cursor: pointer;
    color: #00aaff;
    text-shadow: 0 0 10px #00aaff;
  }

  .popup-title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .popup-desc {
    font-size: 20px;
    margin-bottom: 30px;
  }

  .download-btn {
    display: block;
    width: 200px;
    margin: 0 auto;
    padding: 12px;
    text-align: center;
    background: #000000;
    border: 3px solid #00aaff;
    border-radius: 15px;
    color: #00aaff;
    font-size: 24px;
    font-weight: bold;
    text-decoration: none;
    box-shadow:
      0 0 10px #00aaff,
      0 0 20px #00aaff;
    transition: 0.3s;
  }

  .download-btn:hover {
    background: #001122;
    box-shadow:
      0 0 15px #00ccff,
      0 0 30px #00ccff;
  }
</style>
</head>
<body>

<div class="neon-text">NOFILE Games</div>

<!-- Button -->
<div class="tool-button" onclick="openPopup('Physics sandbox', 'This is a physics sandbox.', 'https://drive.google.com/file/d/1Pd2Fw5c5VWiJdG6-ed27ilH5wFTVsVV8/view?usp=drive_link')">
  Physics sandbox
</div>

<div class="tool-button" onclick="openPopup('The Not-So-Scary Horror Game[Beta]', 'beta', 'https://drive.google.com/file/d/1op-YB829E3YO4GZV5GuGitgKWuNUSraV/view?usp=drive_link')">
  The Not-So-Scary Horror Game[Beta]
</div>

<div class="tool-button" onclick="openPopup('Sanity test', 'test', 'https://drive.google.com/file/d/1QxiRuckSPV_PTHTB4HgMTqtpHPUUYGm0/view?usp=drive_link')">
  Sanity test
</div>

<!-- Window -->
<div class="popup-bg" id="popup">
  <div class="popup-window">
    <div class="popup-close" onclick="closePopup()">×</div>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-desc" id="popup-desc"></div>
    <a id="popup-link" class="download-btn" target="_blank">Download</a>
  </div>
</div>

<script>
function openPopup(title, desc, link) {
  document.getElementById("popup-title").textContent = title;
  document.getElementById("popup-desc").textContent = desc;
  document.getElementById("popup-link").href = link;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
