<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login account</title>
<link rel="icon" href="https://nofileteams.github.io/icon.png">

<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.back-button {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    background: black;
    color: white;
    border: 2px solid #00aaff;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    box-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff;
    text-decoration: none;
    transition: all 0.3s ease;
}

.back-button:hover {
    box-shadow:
        0 0 8px #00aaff,
        0 0 16px #00aaff,
        0 0 32px #00aaff;
}

h1 {
    margin-top: 20px;
    color: #00aaff;
    font-size: 48px;
    text-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff,
        0 0 40px #00aaff;
}

.credit-text {
    color: #00aaff;
    font-size: 14px;
    margin-top: 5px;
    text-shadow:
        0 0 3px #00aaff,
        0 0 6px #00aaff;
}

.input-box {
    width: 300px;
    padding: 12px;
    margin-top: 15px;
    background: black;
    color: white;
    border: 2px solid #00aaff;
    border-radius: 8px;
    outline: none;
    font-size: 16px;
    box-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff;
}

.input-box::placeholder {
    color: #cccccc;
}

.start-button {
    width: 300px;
    padding: 12px;
    margin-top: 15px;
    background: black;
    color: white;
    border: 2px solid #00aaff;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    box-shadow:
        0 0 5px #00aaff,
        0 0 10px #00aaff,
        0 0 20px #00aaff;
}

.start-button:hover {
    box-shadow:
        0 0 8px #00aaff,
        0 0 16px #00aaff,
        0 0 32px #00aaff;
}

.start-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>

<a href="https://nofileteams.github.io" class="back-button">← Back to Home</a>

<h1>Login NOFILE account</h1>
<p class="credit-text">WEB-site by nofileteams, Programming by hayato807, Hosting:github</p>

<input type="text" id="index1" class="input-box" placeholder="nickname">
<input type="password" id="index2" class="input-box" placeholder="password">

<button id="startButton" class="start-button" disabled>Login</button>

<script>
Parse.initialize("B8PFCPMxHRtPexBXtp5ErHbCkaffcsDt2HjfMsKE","U8PaiCuaxQW4KKXq4GKNhN8Qc7nFIkKC1o4v4Lwx");
Parse.serverURL="https://parseapi.back4app.com";

const index1 = document.getElementById("index1");
const index2 = document.getElementById("index2");
const startButton = document.getElementById("startButton");

function updateButton() {
    startButton.disabled = !(index1.value.trim() && index2.value.trim());
}

index1.addEventListener("input", updateButton);
index2.addEventListener("input", updateButton);

startButton.addEventListener("click", async () => {
    startButton.disabled = true;

    try {
        const Data = Parse.Object.extend("Data");
        const query = new Parse.Query(Data);

        query.equalTo("index1", index1.value.trim());

        const result = await query.first();

        if (!result) {
            alert("error");
            updateButton();
            return;
        }

        if (!result.has("index2")) {
            alert("error");
            updateButton();
            return;
        }

        if (result.get("index2") !== index2.value.trim()) {
            alert("error");
            updateButton();
            return;
        }

        localStorage.setItem("index1", index1.value.trim());
        localStorage.setItem("index2", index2.value.trim());

        location.href = "https://nofileteams.github.io";
    } catch (e) {
        alert("error");
        updateButton();
    }
});
</script>

</body>
</html>
