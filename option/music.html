<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>music ground</title>
    <link rel="icon" href="https://nofileteams.github.io/icon.png" type="image/png">
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }

        .neon-text {
            position: absolute;
            left: 50%;
            top: calc(5% + 5px);
            transform: translateX(-50%);
            color: #00bfff;
            font-size: 36px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-shadow:
                0 0 4px #00bfff,
                0 0 8px #00bfff,
                0 0 16px #00bfff,
                0 0 24px #00bfff,
                0 0 40px #00bfff;
            user-select: none;
        }

        .neon-line {
            position: absolute;
            left: 50%;
            top: calc(5% + 43px);
            transform: translateX(-50%);
            width: 1500px;
            height: 2px;
            background: #00bfff;
            box-shadow:
                0 0 4px #00bfff,
                0 0 8px #00bfff,
                0 0 16px #00bfff,
                0 0 24px #00bfff;
            border-radius: 2px;
        }

        .neon-button,
        .stop,
        .neon-button-two {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 28px;
            background: transparent;
            color: #00bfff;
            border: 2px solid #00bfff;
            border-radius: 10px;
            font-size: 18px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
            text-shadow:
                0 0 4px #00bfff,
                0 0 8px #00bfff,
                0 0 16px #00bfff;
            box-shadow:
                0 0 4px #00bfff,
                0 0 8px #00bfff,
                0 0 16px #00bfff;
        }

        .neon-button {
            top: calc(5% + 73px);
        }

        .neon-button-two {
            top: calc(5% + 133px);
        }

        .stop {
            top: calc(5% + 193px);
        }

        .neon-button:hover,
        .stop:hover,
        .neon-button-two:hover {
            background: rgba(0, 191, 255, 0.15);
            box-shadow:
                0 0 8px #00bfff,
                0 0 16px #00bfff,
                0 0 24px #00bfff,
                0 0 40px #00bfff;
            text-shadow:
                0 0 8px #00bfff,
                0 0 16px #00bfff,
                0 0 24px #00bfff;
        }

        .neon-button:active,
        .stop:active,
        .neon-button-two:active {
            transform: translateX(-50%) scale(0.97);
        }
    </style>
</head>
<body>

    <div class="neon-text">music ground</div>
    <div class="neon-line"></div>

    <button class="neon-button">mus1</button>
    <button class="neon-button-two">mus2</button>
    <button class="stop">STOP</button>

    <script>
        const audio1 = new Audio("https://nofileteams.github.io/nofile-data/dgsg.ogg");
        audio1.loop = true;
        audio1.preload = "auto";
        const audio2 = new Audio("https://nofileteams.github.io/nofile-data/inukuma_wip.ogg");
        audio2.loop = true;
        audio2.preload = "auto";

        const btn1 = document.querySelector(".neon-button");
        const btn2 = document.querySelector(".neon-button-two");
        const stopBtn = document.querySelector(".stop");

        btn1.addEventListener("click", function() {
            audio2.pause();
            audio2.currentTime = 0;
            audio1.currentTime = 0;
            audio1.play();
        });

        btn2.addEventListener("click", function() {
            audio1.pause();
            audio1.currentTime = 0;
            audio2.currentTime = 0;
            audio2.play();
        });

        stopBtn.addEventListener("click", function() {
            audio1.pause();
            audio2.pause();
            audio1.currentTime = 0;
            audio2.currentTime = 0;
        });
    </script>
</body>
</html>
